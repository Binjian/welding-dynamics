# 模块 7b: 六自由度焊接机械臂 (球腕 6R, 标准 DH)
# 连杆按实心圆柱建模; J_rotor 为折算到关节侧的电机/减速器惯量
# (腕轴惯量的主项, 同时保证 M(q) 良态)。
_target_: welding_dynamics.robot_vi.SixDofArm
m: [6.0, 4.0, 2.5, 1.5, 1.0, 0.5]   # kg    连杆质量
r_link: 0.04     # m      连杆等效圆柱半径
J_rotor: 0.03    # kg·m²  折算电机/减速器惯量 (每关节)
d1: 0.40         # m      肩高
a1: 0.05         # m      肩侧偏
a2: 0.40         # m      大臂
a3: 0.05         # m      肘偏
d4: 0.35         # m      小臂
d6: 0.10         # m      法兰->枪尖
g: 9.81          # m/s^2
